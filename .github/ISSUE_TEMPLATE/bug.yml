name: Bug report
description: Report a reproducible ManuLoom defect without private source material.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Never paste API keys, Cookies, private notes, or copyrighted transcripts/screenshots you cannot redistribute.
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [Installer, Hermes/Feishu, Browser extension, Bilibili, YouTube, Douyin, Xiaohongshu, Zhihu, Generic web, Manuscript output, Other]
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Prefer a public test URL or synthetic fixture.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Redacted doctor output
      description: Run scripts/manuloom doctor. It should not print secret values, but still review before posting.
