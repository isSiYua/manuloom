<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">证据采集与统一处理管线</title>
  <desc id="desc">视频和图文来源经过不同采集路径后进入统一证据层，再生成结构化笔记。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071426"/><stop offset="1" stop-color="#111b3c"/></linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#22d3ee"/><stop offset=".55" stop-color="#8b5cf6"/><stop offset="1" stop-color="#f59e0b"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity=".35"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker>
  </defs>
  <rect width="1200" height="560" rx="28" fill="url(#bg)"/>
  <text x="60" y="70" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="28" font-weight="700">不同来源，共享一条证据管线</text>
  <g font-family="system-ui,sans-serif" filter="url(#shadow)">
    <rect x="60" y="125" width="220" height="125" rx="18" fill="#102542" stroke="#38bdf8"/>
    <text x="85" y="170" fill="#7dd3fc" font-size="22" font-weight="700">视频来源</text>
    <text x="85" y="207" fill="#cbd5e1" font-size="18">字幕 → 本地 ASR 回退</text>
    <rect x="60" y="310" width="220" height="125" rx="18" fill="#211b45" stroke="#a78bfa"/>
    <text x="85" y="355" fill="#c4b5fd" font-size="22" font-weight="700">图文来源</text>
    <text x="85" y="392" fill="#cbd5e1" font-size="18">正文结构 + 原图顺序</text>
    <rect x="420" y="190" width="280" height="180" rx="22" fill="#12223d" stroke="url(#flow)" stroke-width="3"/>
    <text x="560" y="245" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="700">统一证据层</text>
    <text x="560" y="285" text-anchor="middle" fill="#cbd5e1" font-size="18">Source ID · 时间轴 · 文档顺序</text>
    <text x="560" y="320" text-anchor="middle" fill="#cbd5e1" font-size="18">视觉请求 · 元数据 · 审计材料</text>
    <rect x="845" y="160" width="295" height="240" rx="24" fill="#172033" stroke="#fbbf24"/>
    <text x="992" y="215" text-anchor="middle" fill="#fde68a" font-size="24" font-weight="700">详细 Obsidian 笔记</text>
    <line x1="885" y1="250" x2="1100" y2="250" stroke="#64748b" stroke-width="8" stroke-linecap="round"/>
    <line x1="885" y1="285" x2="1065" y2="285" stroke="#475569" stroke-width="7" stroke-linecap="round"/>
    <line x1="885" y1="320" x2="1010" y2="320" stroke="#475569" stroke-width="7" stroke-linecap="round"/>
    <rect x="885" y="345" width="82" height="32" rx="7" fill="#0e7490"/>
    <rect x="985" y="345" width="115" height="32" rx="7" fill="#6d28d9"/>
  </g>
  <path d="M280 188 C340 188 350 235 420 245" fill="none" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M280 372 C340 372 350 325 420 315" fill="none" stroke="#a78bfa" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M700 280 C760 280 790 280 845 280" fill="none" stroke="url(#flow)" stroke-width="7" marker-end="url(#arrow)"/>
</svg>
