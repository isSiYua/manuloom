<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">视觉过程与选帧发布策略</title>
  <desc id="desc">逐步累积、结果揭示、关键瞬间和静态信息采用不同的保守选帧策略。</desc>
  <rect width="1200" height="620" rx="28" fill="#081426"/>
  <text x="60" y="68" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="28" font-weight="700">视觉过程决定选帧策略</text>
  <g font-family="system-ui,sans-serif">
    <g transform="translate(60 115)">
      <rect width="250" height="390" rx="20" fill="#10233e" stroke="#22d3ee"/>
      <text x="25" y="48" fill="#67e8f9" font-size="22" font-weight="700">逐步累积</text>
      <text x="25" y="80" fill="#94a3b8" font-size="16">PPT · 白板 · 标注</text>
      <g transform="translate(25 115)">
        <rect width="58" height="72" rx="8" fill="#172554" stroke="#64748b"/><rect x="72" width="58" height="72" rx="8" fill="#1e3a5f" stroke="#64748b"/><rect x="144" width="58" height="72" rx="8" fill="#164e63" stroke="#22d3ee" stroke-width="3"/>
        <path d="M17 50h24M89 50h24M161 28h24M161 50h24" stroke="#cbd5e1" stroke-width="5" stroke-linecap="round"/>
      </g>
      <text x="25" y="235" fill="#e2e8f0" font-size="18">选择本轮内容完成后的</text><text x="25" y="263" fill="#e2e8f0" font-size="18">稳定状态</text>
      <rect x="25" y="305" width="175" height="42" rx="10" fill="#0e7490"/><text x="112" y="332" text-anchor="middle" fill="white" font-size="17">stable completion</text>
    </g>
    <g transform="translate(350 115)">
      <rect width="250" height="390" rx="20" fill="#171d3e" stroke="#8b5cf6"/>
      <text x="25" y="48" fill="#c4b5fd" font-size="22" font-weight="700">结果揭示</text>
      <text x="25" y="80" fill="#94a3b8" font-size="16">终端 · 图表 · 软件输出</text>
      <rect x="25" y="115" width="200" height="100" rx="10" fill="#0f172a" stroke="#64748b"/>
      <path d="M48 145l14 12-14 12M78 170h65" stroke="#a78bfa" stroke-width="5" fill="none" stroke-linecap="round"/><path d="M48 190h130" stroke="#22c55e" stroke-width="5" stroke-linecap="round"/>
      <text x="25" y="255" fill="#e2e8f0" font-size="18">等待命令与结果同时</text><text x="25" y="283" fill="#e2e8f0" font-size="18">完整出现</text>
      <rect x="25" y="305" width="175" height="42" rx="10" fill="#6d28d9"/><text x="112" y="332" text-anchor="middle" fill="white" font-size="17">result visible</text>
    </g>
    <g transform="translate(640 115)">
      <rect width="250" height="390" rx="20" fill="#2b1e31" stroke="#f59e0b"/>
      <text x="25" y="48" fill="#fcd34d" font-size="22" font-weight="700">关键瞬间</text>
      <text x="25" y="80" fill="#94a3b8" font-size="16">实验 · 游戏 · 动态演示</text>
      <polyline points="25,190 65,160 100,180 138,120 175,170 225,145" fill="none" stroke="#fbbf24" stroke-width="6"/>
      <circle cx="138" cy="120" r="10" fill="#fb7185"/><line x1="138" y1="105" x2="138" y2="215" stroke="#fb7185" stroke-width="2" stroke-dasharray="6 6"/>
      <text x="25" y="255" fill="#e2e8f0" font-size="18">保持最能表达讲解内容的</text><text x="25" y="283" fill="#e2e8f0" font-size="18">语义时刻</text>
      <rect x="25" y="305" width="175" height="42" rx="10" fill="#b45309"/><text x="112" y="332" text-anchor="middle" fill="white" font-size="17">semantic moment</text>
    </g>
    <g transform="translate(930 115)">
      <rect width="210" height="390" rx="20" fill="#132a2c" stroke="#22c55e"/>
      <text x="25" y="48" fill="#86efac" font-size="22" font-weight="700">无法证明</text>
      <text x="25" y="80" fill="#94a3b8" font-size="16">变化不可信或类型未知</text>
      <circle cx="105" cy="165" r="53" fill="none" stroke="#34d399" stroke-width="8"/><path d="M80 165h50M105 140v50" stroke="#34d399" stroke-width="7" stroke-linecap="round"/>
      <text x="25" y="255" fill="#e2e8f0" font-size="18">不冒险替换</text><text x="25" y="283" fill="#e2e8f0" font-size="18">保留原时间点</text>
      <rect x="25" y="305" width="160" height="42" rx="10" fill="#047857"/><text x="105" y="332" text-anchor="middle" fill="white" font-size="17">keep original</text>
    </g>
  </g>
  <text x="60" y="565" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="18">所有调整均在本地完成；不增加视觉模型图片比较轮次。</text>
</svg>
